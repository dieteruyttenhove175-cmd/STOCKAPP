<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script>
    (function () {
      const storageKey = 'stockapp.sid';
      const templateSid =
        '<?= model && model.bootstrapSessionId ? model.bootstrapSessionId : "" ?>' ||
        '<?= model && model.currentSessionId ? model.currentSessionId : "" ?>' ||
        '';

      if (templateSid) {
        sessionStorage.setItem(storageKey, templateSid);

        const url = new URL(window.location.href);
        if (url.searchParams.has('sid')) {
          url.searchParams.delete('sid');
          const qs = url.searchParams.toString();
          const newUrl = url.pathname + (qs ? '?' + qs : '') + url.hash;
          history.replaceState({}, document.title, newUrl);
        }
      }
    })();
  </script>

  <!-- SheetJS voor browser-side Excel parsing -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    window.PAGE_ROLE = '<?= model && model.pageRole ? model.pageRole : "" ?>';
    window.PAGE_PERMISSIONS = <?!= JSON.stringify(model && model.permissions ? model.permissions : {}) ?>;

    window.SESSION_ID =
      sessionStorage.getItem('stockapp.sid') ||
      '<?= model && model.currentSessionId ? model.currentSessionId : "" ?>' ||
      '<?= model && model.bootstrapSessionId ? model.bootstrapSessionId : "" ?>' ||
      '';

    if (window.SESSION_ID && !sessionStorage.getItem('stockapp.sid')) {
      sessionStorage.setItem('stockapp.sid', window.SESSION_ID);
    }

    window.CURRENT_USER_NAME = '<?= model && model.currentUserName ? model.currentUserName : "" ?>';
    window.CURRENT_USER_ROLE = '<?= model && model.currentUserRole ? model.currentUserRole : "" ?>';
    window.CURRENT_AUTH_MODE = '<?= model && model.currentAuthMode ? model.currentAuthMode : "" ?>';
  </script>

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
      --primary: #0f172a;
      --primary-soft: #e2e8f0;
      --green: #16a34a;
      --green-soft: #dcfce7;
      --yellow-soft: #fef3c7;
      --red-soft: #fee2e2;
      --blue-soft: #dbeafe;
      --gray-soft: #e5e7eb;
      --violet-soft: #ede9fe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1, h2, h3 { margin: 0 0 10px; }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .banner, .success, .error {
      padding: 12px;
      border-radius: 12px;
      display: none;
      margin-bottom: 16px;
    }

    .banner { background: var(--yellow-soft); border: 1px solid #f59e0b; }
    .success { background: var(--green-soft); border: 1px solid #22c55e; }
    .error { background: var(--red-soft); border: 1px solid #ef4444; }

    .grid { display: grid; gap: 12px; }
    .grid.stats { grid-template-columns: repeat(6, 1fr); }
    .grid.topbar { grid-template-columns: 1fr auto auto; align-items: end; }
    .grid.two { grid-template-columns: 1fr 1fr; }
    .grid.three { grid-template-columns: 1fr 1fr 1fr; }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
    }

    .stat .value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 6px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 0;
      background: var(--primary-soft);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input, select, button, textarea {
      font-size: 16px;
      border-radius: 12px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: #fff;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-light {
      background: var(--primary-soft);
      color: var(--text);
    }

    .btn-green {
      background: var(--green);
      color: #fff;
    }

    .btn-red {
      background: #dc2626;
      color: #fff;
    }

    .pill {
      display: inline-block;
      background: var(--blue-soft);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--primary-soft);
    }

    .status-aangevraagd { background: var(--yellow-soft); }
    .status-klaargezet { background: var(--green-soft); }
    .status-meegegeven { background: var(--blue-soft); }
    .status-niet-afgehaald { background: var(--red-soft); }
    .status-verwacht { background: var(--yellow-soft); }
    .status-in-behandeling { background: var(--violet-soft); }
    .status-ingediend { background: var(--blue-soft); }
    .status-goedgekeurd { background: var(--green-soft); }
    .status-gesloten { background: var(--gray-soft); }
    .status-open { background: var(--yellow-soft); }
    .status-geboekt { background: var(--green-soft); }
    .status-gelezen { background: var(--gray-soft); }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      vertical-align: top;
    }

    .right { text-align: right; }
    .selected-row { background: #f8fafc; }
    .delta-row { background: #fff7ed; }
    .alert-row { background: #fff7ed; }

    .line-input { width: 92px; }
    .line-select { min-width: 180px; }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0 16px;
    }

    .note-box {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .empty-state {
      color: var(--muted);
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 12px;
    }

    #popupOverlay,
    #confirmOverlay,
    #busyOverlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #popupBox,
    #confirmBox,
    #busyBox {
      background: white;
      border-radius: 18px;
      padding: 24px;
      width: min(92%, 440px);
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.18);
    }

    #popupMessage,
    #confirmMessage,
    #busyMessage {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    #confirmActions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hidden { display: none !important; }

    @media (max-width: 1200px) {
      .grid.stats { grid-template-columns: repeat(2, 1fr); }
      .grid.topbar, .grid.two, .grid.three { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .grid.stats { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .toolbar button { width: 100%; }
    }
  </style>
</head>
