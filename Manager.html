<!DOCTYPE html>
<html>
  <head>
    <?!= include('_shared_shell_head', model) ?>
    <script>
      window.BOOTSTRAP_MODEL = <?= JSON.stringify(model || {}) ?>;
      window.BOOTSTRAP_SESSION_ID = <?= JSON.stringify((model && (model.bootstrapSessionId || model.currentSessionId || model.sessionId)) || '') ?>;
      window.CURRENT_SESSION_ID = window.BOOTSTRAP_SESSION_ID;
    </script>
  </head>
  <body class="<?= (model && model.bodyClass) || 'page-manager' ?>">
    <div id="managerApp" class="app-shell app-shell-manager">
      <div class="app-container">
        <header class="app-page-header">
          <div class="app-page-title-wrap">
            <h1 class="app-page-title"><?= (model && model.pageTitle) || 'Manager dashboard' ?></h1>
            <p class="app-page-subtitle"><?= (model && model.pageSubtitle) || 'Goedkeuringen, stock, tellingen, audits en meldingen.' ?></p>
          </div>
          <div class="app-page-meta">
            <span class="role-badge"><?= (model && (model.currentUserRole || model.pageRole)) || 'manager' ?></span>
            <? if (model && model.currentUserName) { ?>
              <span class="chip"><?= model.currentUserName ?></span>
            <? } ?>
            <? if (model && model.currentUserEmail) { ?>
              <span class="chip"><?= model.currentUserEmail ?></span>
            <? } ?>
          </div>
        </header>

        <section class="card section-pad">
          <div class="loading-state">Managerdashboard laden…</div>
        </section>
      </div>
    </div>

    <script><?!= include('_shared_common_js', model) ?></script>
    <script><?!= include('_shared_loader_js', model) ?></script>
    <script>
      (function (window, document) {
        'use strict';

        var APP = window.STOCKAPP = window.STOCKAPP || {};
        var MODEL = APP.model || window.BOOTSTRAP_MODEL || {};

        if (APP.managerPageInitialized) return;
        APP.managerPageInitialized = true;

        function validateManagerContext() {
          var role = APP.safeText(MODEL.currentUserRole || MODEL.pageRole).toLowerCase();

          if (!role) {
            throw new Error('Geen gebruikersrol gevonden voor het managerdashboard.');
          }

          if (role !== 'manager') {
            throw new Error('Ongeldige context voor Manager.html.');
          }

          return role;
        }

        function syncBodyState() {
          var body = document.body;
          if (!body) return;

          body.classList.add('page-manager');
          body.setAttribute('data-page-role', APP.safeText(MODEL.pageRole || 'manager'));
        }

        function exposeManagerMeta() {
          window.MANAGER_APP_META = {
            pageRole: APP.safeText(MODEL.pageRole || 'manager'),
            currentUserName: APP.safeText(MODEL.currentUserName || ''),
            currentUserRole: APP.safeText(MODEL.currentUserRole || ''),
            currentUserEmail: APP.safeText(MODEL.currentUserEmail || '')
          };
        }

        function initManagerPage() {
          validateManagerContext();
          syncBodyState();
          exposeManagerMeta();

          if (typeof APP.initSharedDashboard === 'function') {
            APP.initSharedDashboard();
          }
        }

        try {
          initManagerPage();
        } catch (err) {
          var root = document.getElementById('managerApp');
          if (root) {
            root.innerHTML = [
              '<div class="app-container">',
                '<section class="card section-pad">',
                  '<div class="banner banner-error">',
                    APP.escapeHtml(err.message || 'Managerdashboard kon niet geladen worden.'),
                  '</div>',
                '</section>',
              '</div>'
            ].join('');
          }
        }

      })(window, document);
    </script>
  </body>
</html>
