<div class="card">
  <h1 id="pageTitle"><?= model && model.pageTitle ? model.pageTitle : 'Techniekerscherm' ?></h1>
  <div class="muted" id="pageSubtitle"><?= model && model.pageSubtitle ? model.pageSubtitle : '' ?></div>
</div>

<div id="successBox" class="success"></div>
<div id="errorBox" class="error"></div>
<div id="reminderBox" class="banner"></div>

<div id="popupOverlay">
  <div id="popupBox">
    <div id="popupMessage">Actie uitgevoerd</div>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<div id="confirmOverlay">
  <div id="confirmBox">
    <div id="confirmMessage">Bevestigen?</div>
    <div id="confirmActions">
      <button id="confirmOkBtn">Ja</button>
      <button class="btn-light" onclick="closeConfirm()">Annuleren</button>
    </div>
  </div>
</div>

<div id="busyOverlay">
  <div id="busyBox">
    <div id="busyMessage">Backend bezig...</div>
    <div class="muted">Even wachten</div>
  </div>
</div>

<div class="card">
  <div class="grid topbar">
    <div>
      <label for="actorInput"><?= model && model.actorLabel ? model.actorLabel : 'Naam technieker' ?></label>
      <input id="actorInput" placeholder="<?= model && model.actorPlaceholder ? model.actorPlaceholder : 'Bijv. Dieter' ?>">
    </div>
    <button class="btn-light" id="refreshBtn" onclick="manualTechRefresh()">Vernieuwen</button>
    <button class="btn-light" id="clearSelectionBtn" onclick="clearTechSelection()">Selectie wissen</button>
  </div>
</div>

<div class="card">
  <div class="tabs">
    <button id="tabNewOrderBtn" class="tab-btn active" onclick="switchTechTab('neworder')">Nieuwe bestelling</button>
    <button id="tabOrderedBtn" class="tab-btn" onclick="switchTechTab('ordered')">Reeds bestelde</button>
    <button id="tabNotificationsBtn" class="tab-btn" onclick="switchTechTab('notifications')">Meldingen</button>
    <button id="tabBusCountBtn" class="tab-btn" onclick="switchTechTab('buscount')">Busstocktelling</button>
    <button id="tabMobileBtn" class="tab-btn" onclick="switchTechTab('mobile')">Mobiel magazijn</button>
  </div>
</div>
