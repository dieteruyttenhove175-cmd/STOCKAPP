<script>
  function renderTechNotificationsData(data) {
    APP_STATE.techNotificationsData = data || {};
    renderTechNotifications((data && data.notifications) || []);
  }

  function renderTechNotifications(rows) {
    const wrap = document.getElementById('techNotificationsWrap');
    if (!wrap) return;

    if (!rows.length) {
      wrap.innerHTML = '<div class="empty-state">Geen meldingen.</div>';
      return;
    }

    wrap.innerHTML = rows.map(item => `
      <div class="card" style="margin-bottom:12px; border-radius:12px; padding:14px;">
        <div>
          <span class="pill">${item.type || 'Melding'}</span>
          <span class="pill">${item.status || ''}</span>
          ${item.datum ? `<span class="pill">${item.datum}</span>` : ''}
        </div>
        <div style="font-weight:700; margin-top:6px;">${item.titel || ''}</div>
        <div class="muted" style="margin-top:6px;">${item.bericht || ''}</div>
      </div>
    `).join('');
  }
</script>
