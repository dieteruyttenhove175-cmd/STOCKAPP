<!DOCTYPE html>
<html>
  <head>
    <?!= include('_shared_shell_head', model) ?>
    <script>
      window.BOOTSTRAP_MODEL = <?= JSON.stringify(model || {}) ?>;
      window.BOOTSTRAP_SESSION_ID = <?= JSON.stringify((model && (model.bootstrapSessionId || model.currentSessionId || model.sessionId)) || '') ?>;
      window.CURRENT_SESSION_ID = window.BOOTSTRAP_SESSION_ID;
    </script>
  </head>
  <body class="<?= (model && model.bodyClass) || 'page-mobilewarehouse' ?>">
    <div id="mobileWarehouseApp" class="app-shell app-shell-mobilewarehouse">
      <div class="app-container">
        <header class="app-page-header">
          <div class="app-page-title-wrap">
            <h1 class="app-page-title"><?= (model && model.pageTitle) || 'Mobiel magazijn dashboard' ?></h1>
            <p class="app-page-subtitle"><?= (model && model.pageSubtitle) || 'Overzicht voor mobiel magazijn.' ?></p>
          </div>
          <div class="app-page-meta">
            <span class="role-badge"><?= (model && (model.currentUserRole || model.pageRole)) || 'mobilewarehouse' ?></span>
            <? if (model && model.currentUserName) { ?>
              <span class="chip"><?= model.currentUserName ?></span>
            <? } ?>
            <? if (model && model.currentUserEmail) { ?>
              <span class="chip"><?= model.currentUserEmail ?></span>
            <? } ?>
            <? if (model && (model.selectedMobileWarehouseCode || model.requestedMobileWarehouseCode)) { ?>
              <span class="chip">Code <?= (model.selectedMobileWarehouseCode || model.requestedMobileWarehouseCode) ?></span>
            <? } ?>
          </div>
        </header>

        <section class="card section-pad">
          <div class="loading-state">Mobiel magazijndashboard laden…</div>
        </section>
      </div>
    </div>

    <script><?!= include('_shared_common_js', model) ?></script>
    <script><?!= include('_mobilewarehouse_js', model) ?></script>
    <script>
      (function (window, document) {
        'use strict';

        var APP = window.STOCKAPP = window.STOCKAPP || {};
        var MODEL = APP.model || window.BOOTSTRAP_MODEL || {};

        if (APP.mobileWarehousePageInitialized) return;
        APP.mobileWarehousePageInitialized = true;

        function resolveMobileWarehouseCode() {
          return APP.safeText(
            MODEL.selectedMobileWarehouseCode ||
            MODEL.requestedMobileWarehouseCode ||
            MODEL.mobileWarehouseCode ||
            ''
          );
        }

        function validateMobileWarehouseContext() {
          var role = APP.safeText(MODEL.currentUserRole || MODEL.pageRole).toLowerCase();
          var mobileWarehouseCode = resolveMobileWarehouseCode();

          if (!role) {
            throw new Error('Geen gebruikersrol gevonden voor het mobiel magazijndashboard.');
          }

          if (role !== 'mobile_warehouse' && role !== 'mobilewarehouse') {
            throw new Error('Ongeldige context voor MobileWarehouse.html.');
          }

          if (!mobileWarehouseCode) {
            throw new Error('Geen mobiel-magazijncode gevonden voor dit dashboard.');
          }

          return {
            role: role,
            mobileWarehouseCode: mobileWarehouseCode
          };
        }

        function syncBodyState(context) {
          var body = document.body;
          if (!body) return;

          body.classList.add('page-mobilewarehouse');
          body.setAttribute('data-page-role', APP.safeText(MODEL.pageRole || 'mobilewarehouse'));
          body.setAttribute('data-mobile-warehouse-code', APP.safeText(context.mobileWarehouseCode));
        }

        function exposeMobileWarehouseMeta(context) {
          window.MOBILE_WAREHOUSE_APP_META = {
            pageRole: APP.safeText(MODEL.pageRole || 'mobilewarehouse'),
            currentUserName: APP.safeText(MODEL.currentUserName || ''),
            currentUserRole: APP.safeText(MODEL.currentUserRole || ''),
            currentUserEmail: APP.safeText(MODEL.currentUserEmail || ''),
            mobileWarehouseCode: APP.safeText(context.mobileWarehouseCode)
          };
        }

        function initMobileWarehousePage() {
          var context = validateMobileWarehouseContext();
          syncBodyState(context);
          exposeMobileWarehouseMeta(context);

          if (typeof APP.initMobileWarehouseDashboard === 'function') {
            APP.initMobileWarehouseDashboard();
          }
        }

        try {
          initMobileWarehousePage();
        } catch (err) {
          var root = document.getElementById('mobileWarehouseApp');
          if (root) {
            root.innerHTML = [
              '<div class="app-container">',
                '<section class="card section-pad">',
                  '<div class="banner banner-error">',
                    APP.escapeHtml(err.message || 'Mobiel magazijndashboard kon niet geladen worden.'),
                  '</div>',
                '</section>',
              '</div>'
            ].join('');
          }
        }

      })(window, document);
    </script>
  </body>
</html>
