<style>
  .success,
  .error,
  .banner {
    padding: 12px;
    border-radius: 12px;
    display: none;
    margin-bottom: 16px;
  }

  .success {
    background: #dcfce7;
    border: 1px solid #22c55e;
  }

  .error {
    background: #fee2e2;
    border: 1px solid #ef4444;
  }

  .banner {
    background: #fef3c7;
    border: 1px solid #f59e0b;
  }

  #popupOverlay,
  #confirmOverlay,
  #busyOverlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  #popupBox,
  #confirmBox,
  #busyBox {
    background: white;
    border-radius: 18px;
    padding: 24px;
    width: min(90%, 460px);
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.18);
  }

  #popupMessage,
  #confirmTitle,
  #busyTitle {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  #confirmMessage,
  #busyMessage {
    color: #475569;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .popup-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .popup-actions button {
    min-width: 140px;
    min-height: 48px;
  }

  .ui-busy-disabled {
    pointer-events: none;
    opacity: 0.75;
  }

  .spinner {
    width: 42px;
    height: 42px;
    border: 4px solid #e2e8f0;
    border-top: 4px solid #0f172a;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: ui-spin 0.9s linear infinite;
  }

  @keyframes ui-spin {
    to { transform: rotate(360deg); }
  }
</style>
